version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sales_db
    ports:
      - "5432:5432"

  etl:
    build: ./etl
    depends_on:
      - postgres

  dbt:
    build: ./dbt
    depends_on:
      - postgres
